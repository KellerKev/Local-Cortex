# All backends defined; pick the active one with `backend = "..."` at the top
# (or POST /backend at runtime to swap without restarting the proxy).
#
#   cp configs/multi.toml cortex_ollama.toml
#   # set keys, switch backends via:
#   curl -X POST http://127.0.0.1:2031/backend \
#        -H 'Content-Type: application/json' \
#        -d '{"backend":"anthropic"}'

backend = "ollama"

[backends.ollama]
base_url = "http://127.0.0.1:11434"
model    = "qwen3.6:35b-a3b"

[backends.openai]
base_url = "https://api.openai.com/v1"
api_key  = ""                       # or OPENAI_API_KEY in env
model    = "gpt-4o"

[backends.anthropic]
base_url    = "https://api.anthropic.com/v1"
api_key     = ""                    # or ANTHROPIC_API_KEY in env
model       = "claude-sonnet-4-5"
api_version = "2023-06-01"

[snowflake]
# TUI label. Set to whatever matches your active backend so the connection-
# box header reads sensibly (e.g. "ollama", "openai", "anthropic", "lmstudio").
agent_connection = "ollama"
sql_connection   = ""               # set to e.g. "streamgen" for hybrid mode

[proxy]
http_port  = 2031
https_port = 2443
